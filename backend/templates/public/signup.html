{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | GlowCare</title>
  <meta name="description" content="Sign up - GlowCare frontend-only demo store.">
  <meta name="gc-static-base" content="{% static '' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body>
  <div id="appNavbar"></div>

  <main class="auth" id="signupPage">
    <div class="container">
      <div class="panel auth__wrap">
        <h1 class="auth__title">Create account</h1>
        <p class="auth__sub">Frontend-only demo signup using localStorage.</p>

        <form id="signupForm" class="auth__form">
          <div class="field">
            <label class="label" for="name">Name</label>
            <input class="input" id="name" autocomplete="name">
          </div>
          <div class="field">
            <label class="label" for="email">Email</label>
            <input class="input" id="email" autocomplete="email">
          </div>
          <div class="field">
            <label class="label" for="password">Password</label>
            <input class="input" id="password" type="password" autocomplete="new-password">
          </div>
          <div class="error" id="signupError"></div>
          <button class="btn btn--primary btn--full" type="submit">Sign up</button>
        </form>

        <div class="auth__links">
          <a href="login.html">Have an account?</a>
          <a href="forgot.html">Reset password</a>
        </div>
      </div>
    </div>
  </main>

  <div id="appFooter"></div>

  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/signup.js' %}"></script>
</body>
</html>
