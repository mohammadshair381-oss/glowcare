{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist | GlowCare</title>
  <meta name="description" content="Wishlist - GlowCare frontend-only demo store.">
  <meta name="gc-static-base" content="{% static '' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/shop.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body data-authenticated="{% if request.user.is_authenticated %}true{% else %}false{% endif %}"
      data-user-id="{% if request.user.is_authenticated %}{{ request.user.id }}{% endif %}"
      data-user-email="{% if request.user.is_authenticated %}{{ request.user.email }}{% endif %}"
      data-user-name="{% if request.user.is_authenticated %}{{ request.user.first_name|default:request.user.get_username }}{% endif %}"
      data-user-role="{% if request.user.is_authenticated %}{% if request.user.is_staff %}admin{% else %}customer{% endif %}{% endif %}">
  <div id="appNavbar"></div>

  <main class="shop" id="wishlistPage">
    <div class="container">
      <div class="section__head section__head--split">
        <div>
          <h1 class="section__title">Wishlist</h1>
          <p class="section__hint">Saved products for later</p>
        </div>
        <a class="btn btn--ghost" href="shop.html">Shop</a>
      </div>

      <div class="products-grid" id="wishlistGrid" style="margin-top: 16px;"></div>
    </div>
  </main>

  <div id="appFooter"></div>

  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/wishlist.js' %}"></script>
</body>
</html>
