{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | GlowCare</title>
  <meta name="description" content="Shop GlowCare products with filters, sort, and search.">
  <meta name="gc-static-base" content="{% static '' %}">

  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/animations.css' %}">
  <link rel="stylesheet" href="{% static 'css/shop.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body>
  <div id="gcAnnouncement"></div>
  <div id="appNavbar"></div>

  <main class="shop" id="shopPage">
    <div class="container">
      <div class="shop__grid">
        <aside class="filters" id="filtersPanel" aria-label="Filters">
          <div class="filters__backdrop" id="filtersBackdrop" hidden></div>
          <div class="panel filters__card" role="dialog" aria-modal="true" aria-label="Filters" aria-hidden="true">
            <div class="filters__head">
              <div class="filters__title">Filters</div>
              <button class="icon-btn filters__close" type="button" id="closeFilters" aria-label="Close filters">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6 18 18M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
            </div>

            <div class="filters__group">
              <label class="label" for="categorySelect">Category</label>
              <select class="select" id="categorySelect">
                <option value="">All</option>
                <option value="skincare">Skincare</option>
                <option value="hair">Hair</option>
                <option value="makeup">Makeup</option>
                <option value="fragrance">Fragrance</option>
              </select>
            </div>

            <div class="filters__group">
              <div class="label">Brand</div>
              <label class="check"><input type="checkbox" name="brand" value="GlowCare"> GlowCare</label>
              <label class="check"><input type="checkbox" name="brand" value="GlowCare Hair"> GlowCare Hair</label>
              <label class="check"><input type="checkbox" name="brand" value="GlowCare Body"> GlowCare Body</label>
              <label class="check"><input type="checkbox" name="brand" value="GlowCare Fragrance"> GlowCare Fragrance</label>
            </div>

            <div class="filters__group">
              <div class="label">Skin type</div>
              <label class="check"><input type="checkbox" name="skin" value="all"> All</label>
              <label class="check"><input type="checkbox" name="skin" value="oily"> Oily</label>
              <label class="check"><input type="checkbox" name="skin" value="combination"> Combination</label>
              <label class="check"><input type="checkbox" name="skin" value="dry"> Dry</label>
              <label class="check"><input type="checkbox" name="skin" value="sensitive"> Sensitive</label>
            </div>

            <div class="filters__group">
              <div class="label">Concern</div>
              <label class="check"><input type="checkbox" name="concern" value="dullness"> Dullness</label>
              <label class="check"><input type="checkbox" name="concern" value="pigmentation"> Pigmentation</label>
              <label class="check"><input type="checkbox" name="concern" value="barrier"> Barrier</label>
              <label class="check"><input type="checkbox" name="concern" value="acne"> Acne</label>
              <label class="check"><input type="checkbox" name="concern" value="pores"> Pores</label>
              <label class="check"><input type="checkbox" name="concern" value="dryness"> Dryness</label>
            </div>

            <div class="filters__group">
              <div class="label">Price</div>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input class="input" id="minPrice" placeholder="Min">
                <input class="input" id="maxPrice" placeholder="Max">
              </div>
            </div>

            <div style="margin-top: 12px; display:grid; gap: 10px;">
              <button class="btn btn--ghost btn--full" id="clearFilters" type="button">Clear</button>
            </div>
          </div>
        </aside>

        <section>
          <div class="shop__top">
            <div>
              <h1 class="title" style="font-size: 26px; color: var(--text);">Shop</h1>
              <p style="margin-top: 6px;">Curated premium essentials for everyday glow.</p>
            </div>
            <div class="shop__controls">
              <button class="btn btn--ghost shop__filterBtn" id="openFilters" type="button">Filters</button>
              <select class="select" id="sortSelect" aria-label="Sort">
                <option value="popular">Popular</option>
                <option value="rating">Top rated</option>
                <option value="price_asc">Price: Low to high</option>
                <option value="price_desc">Price: High to low</option>
              </select>
            </div>
          </div>

          <div class="shop__results" id="resultsCount" aria-live="polite"></div>
          <div class="grid cards" id="shopGrid" data-animate="fade-in"></div>
        </section>
      </div>
    </div>
  </main>

  <div id="appFooter"></div>

  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/cms-client.js' %}"></script>
  <script src="{% static 'js/animations.js' %}"></script>
  <script src="{% static 'js/shop.js' %}"></script>
</body>
</html>
