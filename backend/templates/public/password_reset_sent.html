{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password reset sent | GlowCare</title>
  <meta name="description" content="Password reset instructions sent.">
  <meta name="gc-static-base" content="{% static '' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body data-authenticated="{% if request.user.is_authenticated %}true{% else %}false{% endif %}"
      data-user-id="{% if request.user.is_authenticated %}{{ request.user.id }}{% endif %}"
      data-user-email="{% if request.user.is_authenticated %}{{ request.user.email }}{% endif %}"
      data-user-name="{% if request.user.is_authenticated %}{{ request.user.first_name|default:request.user.get_username }}{% endif %}"
      data-user-role="{% if request.user.is_authenticated %}{% if request.user.is_staff %}admin{% else %}customer{% endif %}{% endif %}">
  <div id="appNavbar"></div>

  <main class="auth" id="passwordResetSentPage">
    <div class="container">
      <div class="panel auth__wrap">
        <h1 class="auth__title">Check your email</h1>
        <p class="auth__sub">If an account exists for that email, we've sent a reset link.</p>

        <div class="auth__links" style="margin-top: 14px;">
          <a href="{% url 'customers:login' %}">Back to login</a>
        </div>
      </div>
    </div>
  </main>

  <div id="appFooter"></div>

  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
