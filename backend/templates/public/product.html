{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | GlowCare</title>
  <meta name="description" content="Product details for GlowCare beauty essentials.">
  <meta name="gc-static-base" content="{% static '' %}">

  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/animations.css' %}">
  <link rel="stylesheet" href="{% static 'css/product.css' %}">
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body data-authenticated="{% if request.user.is_authenticated %}true{% else %}false{% endif %}"
      data-user-id="{% if request.user.is_authenticated %}{{ request.user.id }}{% endif %}"
      data-user-email="{% if request.user.is_authenticated %}{{ request.user.email }}{% endif %}"
      data-user-name="{% if request.user.is_authenticated %}{{ request.user.first_name|default:request.user.get_username }}{% endif %}"
      data-user-role="{% if request.user.is_authenticated %}{% if request.user.is_staff %}admin{% else %}customer{% endif %}{% endif %}">
  <div id="gcAnnouncement"></div>
  <div id="appNavbar"></div>

  <main class="product" id="productPage">
    <div class="container">
      <div class="breadcrumbs" aria-label="Breadcrumb">
        <a href="/">Home</a>
        <span aria-hidden="true">/</span>
        <a href="shop.html">Shop</a>
        <span aria-hidden="true">/</span>
        <span id="bcName">Product</span>
      </div>

      <section class="product__grid" data-animate="fade-in">
        <div class="product__media">
          <img id="prodMainImg" alt="Product image">
          <div class="thumbs" id="prodThumbs" aria-label="Gallery thumbnails"></div>
        </div>

        <div class="product__info">
          <h1 class="product__title" id="prodName">Product</h1>
          <p class="product__brand" id="prodBrand">—</p>
          <p class="product__desc" id="prodDesc">—</p>

          <div class="product__priceRow">
            <div class="product__price" id="prodPrice">—</div>
            <button class="btn btn--ghost tiny" type="button" id="wishBtn">Wishlist</button>
          </div>

          <div class="product__variants">
            <div class="variant">
              <div class="label">Shade</div>
              <div class="segs" id="shadeWrap"></div>
            </div>
            <div class="variant">
              <div class="label">Size</div>
              <div class="segs" id="sizeWrap"></div>
            </div>
          </div>

          <p class="help" id="stockMsg">—</p>

          <div class="product__actions">
            <div class="qty" aria-label="Quantity selector">
              <button class="qty__btn" type="button" id="qtyMinus" aria-label="Decrease quantity">&#8722;</button>
              <input class="qty__input" id="qty" inputmode="numeric" value="1" aria-label="Quantity">
              <button class="qty__btn" type="button" id="qtyPlus" aria-label="Increase quantity">+</button>
            </div>
            <button class="btn btn--primary product__add" type="button" id="addBtn">Add to cart</button>
          </div>

          <div class="panel" style="margin-top:14px;">
            <div class="title" style="font-size:16px;">Key ingredients</div>
            <ul class="list" id="ingredientsList"></ul>
          </div>

          <div class="panel" style="margin-top:12px;">
            <div class="title" style="font-size:16px;">How to use</div>
            <p style="margin-top:8px;">Apply 2–3 drops on clean skin. Follow with moisturizer. For AM routines, finish with sunscreen.</p>
          </div>
        </div>
      </section>

      <section class="section section--muted" style="padding: 40px 0;">
        <div class="container" style="padding: 0;">
          <div class="section__head section__head--split">
            <div>
              <h2 class="section__title">Related products</h2>
              <p class="section__hint">More picks for your routine</p>
            </div>
            <a class="btn btn--ghost" href="shop.html">View all</a>
          </div>
          <div class="products-grid" id="relatedGrid"></div>
        </div>
      </section>
    </div>
  </main>

  <div id="appFooter"></div>

  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/cms-client.js' %}"></script>
  <script src="{% static 'js/animations.js' %}"></script>
  <script src="{% static 'js/product.js' %}"></script>
</body>
</html>
