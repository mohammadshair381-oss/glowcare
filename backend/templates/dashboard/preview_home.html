{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — GlowCare</title>
  <meta name="gc-static-base" content="{% static '' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..900&family=Manrope:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
  <script>
    window.__GC_PREVIEW_MODE = true;
  </script>

  <div class="gc-progress" aria-hidden="true"><span class="gc-progress__bar" id="gcScrollProgress"></span></div>
  <div class="gc-fx" aria-hidden="true">
    <div class="gc-blobs" id="gcBlobs"></div>
    <div class="gc-particles" id="gcParticles"></div>
    <div class="gc-spotlight" id="gcSpotlight"></div>
  </div>

  <div id="gcAnnouncement"></div>
  <div id="appNavbar"></div>
  <main>
    <div id="gcHome" class="gc-home" aria-label="GlowCare homepage"></div>
  </main>
  <div id="appFooter"></div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'editor/live_preview.js' %}"></script>
  <script src="{% static 'script.js' %}"></script>
</body>
</html>
